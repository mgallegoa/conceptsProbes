server:
  port: 3000
spring:
  application:
    name: SpringBatchChunk
  # datasource:
  #   url: jdbc:h2:mem:SpringChunkDB
  #   username: sa
  #   password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  batch:
    job:
      enable: false
    jdbc:
      initialize-schema: always
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
logging:
  level:
    org.springframework.jdbc.datasource.init: DEBUG
