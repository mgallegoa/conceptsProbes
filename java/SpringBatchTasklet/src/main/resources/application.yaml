server:
  port: 3000

spring:
  application:
    name: SpringBatchTasklet
  # datasource:
  #   url: jdbc:mysql://mysql:3306/SpringBatchTaskletdb?CreateDataBaseIfNotExtis=true
  #   username: root
  #   password: manuelpass
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  # To enable the batch module
  batch:
    job:
      enabled: true
  # To enable the file use in spring
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
