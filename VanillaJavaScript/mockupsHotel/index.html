<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar bg-primary-subtle">
      <a href="/" class="navbar-brand">Manuel's Hotel</a>

      <img
        src="https://www.gravatar.com/avatar/dd43ba3e67fd9efdb57c9b60b16c4306.jpg?s=80"
        alt="Potho Manuel"
        class="rounded-circle"
      />
    </nav>

    <main class="container">
      <section class="row pt-4">
        <article class="col-12">
          <div
            class="btn-toolbar justify-content-between"
            role="toolbar"
            aria-label="Toolbar Options, button and search input"
          >
            <div class="btn-group" role="group" aria-label="First group">
              <button type="button" class="btn btn-outline-primary">
                Create a new Guest
              </button>
            </div>
            <div class="input-group">
              <div class="input-group-text" id="btnGroupAddon2">@</div>
              <input
                type="text"
                class="form-control"
                placeholder="Search Guest"
                aria-label="Input group Guest"
                aria-describedby="btnGroupAddon2"
              />
            </div>
          </div>
        </article>
      </section>
      <section class="row pt-3">
        <article class="card col-12 col-md-4">
          <div class="card-header">
            <h2>Manuel</h2>
          </div>
          <div class="card-body">Body manuel change</div>
        </article>
        <article class="pt-4 col-12 col-md-8">
          <table class="table table-striped">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">First</th>
                <th scope="col">Last</th>
                <th scope="col">Handle</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th scope="row">1</th>
                <td>Mark</td>
                <td>Otto</td>
                <td>@mdo</td>
              </tr>
              <tr>
                <th scope="row">2</th>
                <td>Jacob</td>
                <td>Thornton</td>
                <td>@fat</td>
              </tr>
              <tr>
                <th scope="row">3</th>
                <td>John</td>
                <td>Doe</td>
                <td>@social</td>
              </tr>
            </tbody>
          </table>
        </article>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
